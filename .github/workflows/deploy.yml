name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/thomas-cottis-21/project-nomadica:latest
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_OWNER_USER_ID=${{ secrets.VITE_OWNER_USER_ID }}

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TAIL_SCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAIL_SCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy to basalt
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no deploy@basalt \
            "docker pull ghcr.io/thomas-cottis-21/project-nomadica:latest && \
             docker compose -f /opt/docker/project-nomadica/docker-compose.yml up -d"

      - name: Deploy to forma
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no deploy@sanukite \
            "docker pull ghcr.io/thomas-cottis-21/project-nomadica:latest && \
             docker compose -f /opt/docker/project-nomadica/docker-compose.yml up -d"
